<script>
// Robust async library loader with multiple CDN fallbacks
(function(){
  var libs=[
    {name:'docx',global:'docx',urls:[
      'https://unpkg.com/docx@8.2.3/build/index.js',
      'https://cdn.jsdelivr.net/npm/docx@8.2.3/build/index.js',
      'https://unpkg.com/docx@7.8.2/build/index.js',
      'https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js'
    ]},
    {name:'FileSaver',global:'saveAs',urls:[
      'https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js',
      'https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js'
    ]},
    {name:'JSZip',global:'JSZip',urls:[
      'https://unpkg.com/jszip@3.10.1/dist/jszip.min.js',
      'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js'
    ]}
  ];
  window._libsReady=new Promise(function(resolve){
    var loaded=0,total=libs.length;
    libs.forEach(function(lib){tryLoad(lib,0,function(){loaded++;if(loaded===total)resolve();});});
  });
  function tryLoad(lib,idx,cb){
    if(idx>=lib.urls.length){console.error('FAILED to load: '+lib.name);cb();return;}
    var s=document.createElement('script');s.src=lib.urls[idx];
    s.onload=function(){
      if(typeof window[lib.global]!=='undefined'){console.log('Loaded '+lib.name+' from '+s.src);cb();}
      else{document.head.removeChild(s);tryLoad(lib,idx+1,cb);}
    };
    s.onerror=function(){document.head.removeChild(s);tryLoad(lib,idx+1,cb);};
    document.head.appendChild(s);
  }
})();
</script>

function showStep(){
  const f=FIELDS[step],area=document.getElementById('questionArea');
  document.getElementById('progressFill').style.width=((step+1)/TOTAL*100)+'%';
  document.getElementById('progressText').textContent=`${step+1} / ${TOTAL}`;
  document.getElementById('btnPrev').classList.toggle('hidden',step===0);
  document.getElementById('btnPrev').textContent=t('prev');
  document.getElementById('btnNext').textContent=step===TOTAL-1?t('submit'):t('next');
  const fl=t(f.key),sv=data[f.key]||'';
  let h=`<div class="q-number">${t('qLabel')} ${step+1} / ${TOTAL}</div><div class="q-title">${fl}</div><div class="q-title-jp">${f.jp}</div><div style="height:6px"></div>`;
  // Show hint for fullname field
  if(f.key==='fullname'&&t('fullnameHint'))h+=`<div class="hint-box">${t('fullnameHint').replace(/\n/g,'<br>')}</div>`;
  // Show auto-filled indicator
  // Auto-fill indicator (disabled — manual input only)
  if(f.type==='text'||f.type==='tel'||f.type==='email')h+=`<input type="${f.type}" class="q-input" id="qInput" value="${sv}">`;
  else if(f.type==='date')h+=`<input type="date" class="q-input" id="qInput" value="${sv}">`;
  else if(f.type==='select'){const o=getOpts(f.opts);h+=`<select class="q-input" id="qInput"><option value="">--</option>${o.map(x=>`<option value="${x}"${sv===x?' selected':''}>${x}</option>`).join('')}</select>`;}
  else if(f.type==='textarea')h+=`<textarea class="q-input" id="qInput" rows="4">${sv}</textarea>`;
  else if(f.type==='photo')h+=buildPhotoUpload();
  else if(f.type==='photo_zairyu'){h+=`<div class="hint-box">${t('uploadFirst')||'📸 Upload your residence card and certificates first. They will be shown as reference while you fill in the form.'}</div>`;h+=buildZairyu();}

  else if(f.type==='dynamic_edu')h+=buildEdu();
  else if(f.type==='dynamic_work')h+=buildWork();
  else if(f.type==='dynamic_license')h+=buildLic();
  else if(f.type==='cert_upload')h+=buildCerts();
  // Show reference images panel when filling text fields (after upload steps)
  if(!['photo','photo_zairyu','cert_upload'].includes(f.type) && !f.type.startsWith('dynamic_') && hasUploadedFiles()){
    h+=buildRefPanel();
  }
  area.innerHTML=h;
  const inp=document.getElementById('qInput');
  if(inp){setTimeout(()=>inp.focus(),80);if(f.type!=='textarea')inp.addEventListener('keydown',e=>{if(e.key==='Enter')nextQuestion()});}
}

// Build collapsible reference panel showing uploaded images
function buildRefPanel(){
  const imgs=[];
  zairyuFront.forEach(f=>{if(f.data.startsWith('data:image/'))imgs.push({label:'在留カード 表',src:f.data});});
  zairyuBack.forEach(f=>{if(f.data.startsWith('data:image/'))imgs.push({label:'在留カード 裏',src:f.data});});
  Object.entries(certFiles).forEach(([k,arr])=>{arr.forEach(f=>{if(f.data.startsWith('data:image/'))imgs.push({label:t(k),src:f.data});});});
  if(!imgs.length)return'';
  let h=`<details class="ref-panel" style="margin-top:14px;background:#f0f4ff;border:1px solid #c5cae9;border-radius:10px;padding:10px 14px">
    <summary style="cursor:pointer;font-size:12px;font-weight:600;color:#3949ab">${t('refImages')||'📋 Reference images:'} (${imgs.length})</summary>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;max-height:250px;overflow-y:auto">`;
  imgs.forEach(im=>{h+=`<div style="text-align:center"><img src="${im.src}" style="max-width:180px;max-height:120px;border-radius:6px;border:1px solid #ccc"><div style="font-size:10px;color:#666;margin-top:2px">${im.label}</div></div>`;});
  h+=`</div></details>`;
  return h;
}

// ===== IMAGE COMPRESSION (for mobile) =====
function compressImage(dataUrl,maxW,maxH,quality){
  return new Promise(resolve=>{
    if(!dataUrl.startsWith('data:image/')){resolve(dataUrl);return;}
    const img=new Image();img.onload=()=>{
      let w=img.width,h=img.height;
      if(w<=maxW&&h<=maxH){resolve(dataUrl);return;}
      const ratio=Math.min(maxW/w,maxH/h);
      w=Math.round(w*ratio);h=Math.round(h*ratio);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };img.onerror=()=>resolve(dataUrl);img.src=dataUrl;
  });
}
async function compressFile(dataUrl){return compressImage(dataUrl,1200,1200,0.75);}
async function compressPhoto(dataUrl){return compressImage(dataUrl,600,800,0.85);}

async function onMainPhoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{photoData=await compressPhoto(e.target.result);showStep();};r.readAsDataURL(f);}

function buildZairyu(){
  let h=`<div class="q-subtitle">${t('zairyu')}</div><div class="upload-grid">`;
  // Front
  h+=`<div class="upload-card ${zairyuFront.length?'has-file':''}">
    ${zairyuFront.length?zairyuFront.map(f=>f.data.startsWith('data:image/')?`<img src="${f.data}">`:`<span class="file-tag">📎 ${f.name}</span>`).join('')+`<div class="upload-status">${t('zairyuFront')} - ${t('uploaded')} (${zairyuFront.length})</div>`:`<div class="upload-icon">🪪</div><div class="upload-label">${t('zairyuFront')}</div>`}
    <input type="file" id="zf_front" accept="image/*,.pdf,.doc,.docx" multiple style="display:none" onchange="onZairyu('front',this)">
    <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('zf_front').click()">${t('uploadClick')}</button>
  </div>`;
  // Back
  h+=`<div class="upload-card ${zairyuBack.length?'has-file':''}">
    ${zairyuBack.length?zairyuBack.map(f=>f.data.startsWith('data:image/')?`<img src="${f.data}">`:`<span class="file-tag">📎 ${f.name}</span>`).join('')+`<div class="upload-status">${t('zairyuBack')} - ${t('uploaded')} (${zairyuBack.length})</div>`:`<div class="upload-icon">🪪</div><div class="upload-label">${t('zairyuBack')}</div>`}
    <input type="file" id="zf_back" accept="image/*,.pdf,.doc,.docx" multiple style="display:none" onchange="onZairyu('back',this)">
    <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('zf_back').click()">${t('uploadClick')}</button>
  </div></div>`;
  return h;
}
function onZairyu(side,inp){
  const files=Array.from(inp.files);if(!files.length)return;
  let loaded=0;const target=side==='front'?zairyuFront:zairyuBack;
  files.forEach(file=>{const r=new FileReader();r.onload=async e=>{
    const compressed=await compressFile(e.target.result);
    target.push({name:file.name,data:compressed});loaded++;
    if(loaded===files.length){
      showStep();
      if(file.type.startsWith('image/'))runOCR(compressed,side);
    }
  };r.readAsDataURL(file);});
}

// ===== OCR ENGINE =====
let ocrWorker=null,ocrFrontDone=false,ocrBackDone=false;
async function ensureTesseract(){
  if(typeof Tesseract!=='undefined')return;
  await new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload=resolve;s.onerror=()=>{
      const s2=document.createElement('script');s2.src='https://unpkg.com/tesseract.js@5/dist/tesseract.min.js';
      s2.onload=resolve;s2.onerror=reject;document.head.appendChild(s2);
    };document.head.appendChild(s);
  });
}
function preprocessImage(imgDataUrl){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.width;c.height=img.height;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0);
      // Grayscale + high contrast for better OCR
      const d=ctx.getImageData(0,0,c.width,c.height);
      const px=d.data;
      for(let i=0;i<px.length;i+=4){
        const gray=0.299*px[i]+0.587*px[i+1]+0.114*px[i+2];
        // Increase contrast: stretch histogram
        const v=Math.min(255,Math.max(0,(gray-80)*1.8));
        px[i]=px[i+1]=px[i+2]=v;
      }
      ctx.putImageData(d,0,0);
      resolve(c.toDataURL('image/png'));
    };
    img.onerror=()=>resolve(imgDataUrl); // fallback to original
    img.src=imgDataUrl;
  });
}
async function ocrImage(imgDataUrl){
  await ensureTesseract();
  // Preprocess: grayscale + contrast enhancement
  const processed=await preprocessImage(imgDataUrl);
  const worker=await Tesseract.createWorker('eng+jpn',1,{
    workerPath:'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js',
    corePath:'https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd-lstm.wasm.js',
  });
  const{data:{text}}=await worker.recognize(processed);
  await worker.terminate();
  return text;
}
function showOcrStatus(msg,color){
  let el=document.getElementById('ocrStatus');
  if(!el){el=document.createElement('div');el.id='ocrStatus';el.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a237e;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.3)';document.body.appendChild(el);}
  el.textContent=msg;if(color)el.style.background=color;
  return el;
}

// ===== OCR: 在留カード (disabled auto-fill — ứng viên tự điền) =====
async function runOCR(imgDataUrl,side){
  // OCR auto-fill disabled — chỉ upload ảnh, ứng viên tự điền thông tin
  console.log('OCR disabled — candidate fills manually');
  return;
  const el=showOcrStatus('🔍 '+(t('ocrReading')||'Đang đọc thẻ ngoại kiều...'));
  try{
    const text=await ocrImage(imgDataUrl);
    console.log(`OCR ${side} raw:`,text);
    if(side==='front'){parseZairyuFront(text);ocrFrontDone=true;}
    else{parseZairyuBack(text);ocrBackDone=true;}
    // Auto-lookup postal code from address (always re-lookup when back side provides new address)
    if(data.address)await lookupPostalCode(data.address);
    el.textContent='✅ '+(t('ocrDone')||'Đã đọc xong!');el.style.background='#2e7d32';
    setTimeout(()=>{el.remove();showStep();},2000);
  }catch(e){
    console.error('OCR error:',e);
    el.textContent='⚠️ '+(t('ocrFail')||'Không đọc được, vui lòng nhập tay');el.style.background='#e65100';
    setTimeout(()=>el.remove(),3000);
  }
}

function parseZairyuFront(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  // Words that appear on the card but are NOT the person's name
  const CARD_WORDS=/\b(GOVERNMENT|JAPAN|RESIDENCE|CARD|IMMIGRATION|STATUS|DATE|BIRTH|MALE|FEMALE|NATIONALITY|NAME|BUREAU|MINISTRY|JUSTICE|ADDRESS|PERIOD|STAY|EXPIRATION|NUMBER|TYPE|PERMIT|FOREIGN|NATIONAL|CERTIFICATE|PHOTO|SEX|VALID|AUTHORITY|OF)\b/gi;
  function isCardText(s){
    // Remove known card words; if nothing meaningful remains (less than 3 chars), it's card text
    const cleaned=s.replace(CARD_WORDS,'').replace(/[\s\-\.]+/g,' ').trim();
    return cleaned.length<3;
  }
  // NAME: multiple strategies to find English uppercase name from 在留カード
  if(!data.fullname){
    let foundName='';
    // Strategy 1: find text on same line as 氏名 or NAME label
    for(let i=0;i<lines.length;i++){
      if(/氏\s*名|^NAME\b/i.test(lines[i])){
        // Extract everything after the label
        const sameLine=lines[i].replace(/.*?(?:氏\s*名|NAME)\s*[:：]?\s*/i,'').trim();
        const upperPart=sameLine.match(/([A-Z][A-Z\s\-\.]{2,})/);
        if(upperPart&&upperPart[1].trim().length>3&&!isCardText(upperPart[1])){foundName=upperPart[1].trim();break;}
        // Check next line(s) for the name
        for(let j=1;j<=2&&i+j<lines.length;j++){
          const nextLine=lines[i+j];
          const nextUp=nextLine.match(/([A-Z][A-Z\s\-\.]{2,})/);
          if(nextUp&&nextUp[1].trim().length>3&&!isCardText(nextUp[1])){foundName=nextUp[1].trim();break;}
        }
        if(foundName)break;
      }
    }
    // Strategy 2: any line that is mostly uppercase English and NOT card text
    if(!foundName){
      const nameLines=lines.filter(l=>/^[A-Z][A-Z\s\-\.]{3,}$/.test(l)&&l.length>3&&!isCardText(l));
      if(nameLines.length)foundName=nameLines.sort((a,b)=>b.length-a.length)[0];
    }
    // Strategy 3: extract uppercase substring that contains at least 2 words and is NOT card text
    if(!foundName){
      for(const l of lines){
        const matches=[...l.matchAll(/([A-Z][A-Z]+(?:\s+[A-Z][A-Z]+)+)/g)];
        for(const m of matches){
          if(m[1].length>5&&!isCardText(m[1])){foundName=m[1].trim();break;}
        }
        if(foundName)break;
      }
    }
    if(foundName){data.fullname=foundName.replace(/\s+/g,' ').trim();}
    console.log('OCR name extraction:',foundName||'(not found)');
  }
  // DATE OF BIRTH — multiple date formats
  if(!data.dob){
    const dobPats=[
      /(\d{4})\s*[年\/\.\-]\s*(\d{1,2})\s*[月\/\.\-]\s*(\d{1,2})\s*日?\s*生/,
      /(?:生年月日|DATE\s*OF\s*BIRTH)[^\d]*(\d{4})\s*[年\/\.\-]\s*(\d{1,2})\s*[月\/\.\-]\s*(\d{1,2})/i,
      /(\d{4})\s*[年\/\.\-]\s*(\d{1,2})\s*[月\/\.\-]\s*(\d{1,2})\s*日/,
    ];
    for(const dp of dobPats){
      const dm=text.match(dp);
      if(dm){const yr=parseInt(dm[1]);if(yr>1950&&yr<2015){data.dob=`${dm[1]}-${dm[2].padStart(2,'0')}-${dm[3].padStart(2,'0')}`;break;}}
    }
  }
  // GENDER — check both Japanese and English
  if(!data.gender){
    if(/男\s*性|[^a-zA-Z]男[^a-zA-Z]|Male|MALE|性\s*別.*?男/.test(text))data.gender=t('male');
    else if(/女\s*性|[^a-zA-Z]女[^a-zA-Z]|Female|FEMALE|性\s*別.*?女/.test(text))data.gender=t('female');
  }
  // NATIONALITY — multiple patterns, flexible spacing
  if(!data.nationality){
    const natPats=[/国\s*籍[・\s:：]*([^\n\r]{2,20})/,/(?:NATIONALITY)[・\s:：]*([^\n\r]{2,20})/i];
    for(const np of natPats){
      const nm=text.match(np);
      if(nm){
        let nat=nm[1].trim().replace(/[,。、\/]/g,'').replace(/\s*地域\s*/,'');
        // Map common OCR results to proper names
        const natMap={'ベトナム':'ベトナム','べトナム':'ベトナム','インドネシア':'インドネシア','ネパール':'ネパール','ミャンマー':'ミャンマー','中国':'中国','カンボジア':'カンボジア','モンゴル':'モンゴル','タイ':'タイ','バングラデシュ':'バングラデシュ','フィリピン':'フィリピン'};
        data.nationality=natMap[nat]||JP_DICT[nat.toLowerCase()]||nat;
        break;
      }
    }
    // Fallback: scan for known nationality names in text
    if(!data.nationality){
      const knownNat=['ベトナム','インドネシア','ネパール','ミャンマー','中国','カンボジア','モンゴル','タイ','バングラデシュ','フィリピン','韓国','ブラジル','ペルー'];
      for(const kn of knownNat){if(text.includes(kn)){data.nationality=kn;break;}}
    }
  }
  // VISA TYPE — multiple OCR patterns + fallback to known types
  if(!data.visa){
    const visaPats=[/在留資格[・\s:：]*([^\n\r]{2,30})/,/在\s*留\s*資\s*格[・\s:：]*([^\n\r]{2,30})/,/(?:STATUS\s*OF\s*RESIDENCE|STATUS)[・\s:：]*([^\n\r]{2,30})/i];
    for(const vp of visaPats){const vm=text.match(vp);if(vm){data.visa=vm[1].trim().replace(/[。,、]/g,'');break;}}
    // Fallback: look for known visa types directly in text
    if(!data.visa){
      const knownVisa=['技能実習1号','技能実習2号','技能実習3号','技能実習１号','技能実習２号','技能実習３号','特定技能1号','特定技能2号','特定技能１号','特定技能２号','技術・人文知識・国際業務','留学','家族滞在','永住者','定住者','特定活動'];
      for(const kv of knownVisa){if(text.includes(kv)){data.visa=kv.replace(/１/g,'1').replace(/２/g,'2').replace(/３/g,'3');break;}}
    }
    // Fallback: partial match (OCR might read 技能実習 without the number)
    if(!data.visa){
      if(/技能\s*実習/.test(text)){
        const numM=text.match(/技能\s*実習\s*[1-3１-３]?\s*号?/);
        data.visa=numM?numM[0].replace(/\s+/g,'').replace(/１/g,'1').replace(/２/g,'2').replace(/３/g,'3'):'技能実習';
      }else if(/特定\s*技能/.test(text)){
        const numM=text.match(/特定\s*技能\s*[1-2１-２]?\s*号?/);
        data.visa=numM?numM[0].replace(/\s+/g,'').replace(/１/g,'1').replace(/２/g,'2'):'特定技能';
      }
    }
  }
  // VISA EXPIRY — multiple patterns + smart date detection
  if(!data.visa_exp){
    const expPats=[
      /(?:満了日?|期限|在留期間|PERIOD\s*OF\s*STAY|EXPIR)[^\d]*(\d{4})\s*[年\/\.\-]\s*(\d{1,2})\s*[月\/\.\-]\s*(\d{1,2})/i,
      /(\d{4})\s*[年\/\.\-]\s*(\d{1,2})\s*[月\/\.\-]\s*(\d{1,2})\s*(?:日?\s*まで)/,
    ];
    for(const ep of expPats){const em=text.match(ep);if(em){const yr=parseInt(em[1]);if(yr>2020&&yr<2040){data.visa_exp=`${em[1]}-${em[2].padStart(2,'0')}-${em[3].padStart(2,'0')}`;break;}}}
    // Smart: find all dates, DOB is in the past, expiry is in the future
    if(!data.visa_exp){
      const allDates=[...text.matchAll(/(\d{4})\s*[年\/\.\-]\s*(\d{1,2})\s*[月\/\.\-]\s*(\d{1,2})/g)];
      const now=new Date();
      for(const dm of allDates){
        const yr=parseInt(dm[1]),mo=parseInt(dm[2]),da=parseInt(dm[3]);
        const d=new Date(yr,mo-1,da);
        // Future date = likely expiry (not DOB)
        if(d>now&&yr>2020&&yr<2040){data.visa_exp=`${dm[1]}-${String(mo).padStart(2,'0')}-${String(da).padStart(2,'0')}`;break;}
      }
    }
  }
  // ADDRESS (front) - multiple patterns for OCR variants
  let addrFound=null;
  const addrPats=[/住居地[・\s:：]*([^\n\r]{5,80})/,/住\s*居\s*地[・\s:：]*([^\n\r]{5,80})/,/(?:居所|住所)[・\s:：]*([^\n\r]{5,80})/];
  for(const pat of addrPats){const am=text.match(pat);if(am){addrFound=am[1].trim();break;}}
  // Also try: line containing prefecture name
  if(!addrFound){
    for(const l of lines){
      if(/(東京都|北海道|(?:京都|大阪)府|.{2,3}県).{3,}[市区町村]/.test(l)){
        addrFound=l.replace(/^.*?(東京都|北海道|(?:京都|大阪)府)/,'$1').trim();break;
      }
    }
  }
  if(addrFound&&!data.address)data.address=addrFound;
  console.log('OCR front extracted:',{fullname:data.fullname,dob:data.dob,gender:data.gender,nationality:data.nationality,visa:data.visa,visa_exp:data.visa_exp,address:data.address});
}

function parseZairyuBack(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  // Back side: look for LATEST address (住居地変更 section)
  // Multiple patterns for OCR variants
  const addrPats=[/(?:住居地|新住居地|変更後|住\s*居\s*地|居所|住所)[・\s:：]*([^\n\r]{5,80})/g];
  let allAddrs=[];
  for(const pat of addrPats){let am;while((am=pat.exec(text))!==null){if(am[1].trim().length>5)allAddrs.push(am[1].trim());}}
  // Also find lines with prefecture names (fallback)
  for(const l of lines){
    if(/(東京都|北海道|(?:京都|大阪)府|.{2,3}県).{3,}[市区町村]/.test(l)){
      const addr=l.replace(/^.*?(東京都|北海道|(?:京都|大阪)府)/,'$1').trim();
      if(addr.length>5&&!allAddrs.includes(addr))allAddrs.push(addr);
    }
  }
  if(allAddrs.length){
    // Take the LAST (newest) address — override front address
    data.address=allAddrs[allAddrs.length-1];
    console.log('OCR back: newest address →',data.address);
  }
}

const POSTAL_DB={'東京都千代田区':'100','東京都中央区':'103','東京都港区':'105','東京都新宿区':'160','東京都文京区':'112','東京都台東区':'110','東京都墨田区':'130','東京都江東区':'135','東京都品川区':'140','東京都目黒区':'152','東京都大田区':'143','東京都世田谷区':'154','東京都渋谷区':'150','東京都中野区':'164','東京都杉並区':'166','東京都豊島区':'170','東京都北区':'114','東京都荒川区':'116','東京都板橋区':'173','東京都練馬区':'176','東京都足立区':'120','東京都葛飾区':'124','東京都江戸川区':'132','大阪府大阪市':'530','愛知県名古屋市':'450','埼玉県川口市':'332','埼玉県さいたま市':'330','神奈川県横浜市':'220','千葉県千葉市':'260','北海道札幌市':'060','福岡県福岡市':'810','広島県広島市':'730','京都府京都市':'600','兵庫県神戸市':'650','静岡県浜松市':'430','群馬県前橋市':'371','茨城県水戸市':'310','栃木県宇都宮市':'320','長野県長野市':'380'};
async function lookupPostalCode(address){
  try{
    // Extract prefecture+city+town
    const m=address.match(/(東京都|北海道|(?:京都|大阪)府|.{2,3}県)\s*(.{1,10}?[市区町村郡])\s*(.{0,20}?[町丁目区])?/);
    if(!m){console.log('Postal: no prefecture match in:',address);return;}
    const pref=m[1],city=m[2]||'',town=m[3]||'';
    console.log('Postal lookup:',pref,city,town);
    // Strategy 1: postcodes.jp API (CORS-friendly, free)
    try{
      const q=encodeURIComponent(pref+city+town);
      const resp=await fetch(`https://apis.postcode-jp.com/api/postcodes?general.japanese=${q}`,{signal:AbortSignal.timeout(5000)});
      if(resp.ok){const json=await resp.json();if(json.length&&json[0].postcode){data.postcode=json[0].postcode.slice(0,3)+'-'+json[0].postcode.slice(3);console.log('Postal found (postcode-jp):',data.postcode);return;}}
    }catch(e1){console.log('postcode-jp failed:',e1);}
    // Strategy 2: GeoAPI Heartrails suggest
    try{
      const q2=pref+city;
      const resp2=await fetch(`https://geoapi.heartrails.com/api/json?method=suggest&keyword=${encodeURIComponent(q2)}`,{signal:AbortSignal.timeout(5000)});
      const json2=await resp2.json();
      if(json2.response&&json2.response.location&&json2.response.location.length){
        const loc=json2.response.location[0];
        if(loc.postal){data.postcode=loc.postal;console.log('Postal found (heartrails):',data.postcode);return;}
      }
    }catch(e2){console.log('heartrails failed:',e2);}
    // Strategy 3: zipcloud
    try{
      const q3=pref+city;
      const resp3=await fetch(`https://zipcloud.ibsnet.co.jp/api/search?address=${encodeURIComponent(q3)}`,{signal:AbortSignal.timeout(5000)});
      const json3=await resp3.json();
      if(json3.results&&json3.results.length){
        const zc=json3.results[0].zipcode;
        data.postcode=zc.slice(0,3)+'-'+zc.slice(3);
        console.log('Postal found (zipcloud):',data.postcode);return;
      }
    }catch(e3){console.log('zipcloud failed:',e3);}
    // Strategy 4: Offline database fallback
    const key=pref+city;
    if(POSTAL_DB[key]){data.postcode=POSTAL_DB[key]+'-0000';console.log('Postal found (offline):',data.postcode);}
    else{
      // Try just prefecture + partial city
      for(const[k,v]of Object.entries(POSTAL_DB)){if(key.startsWith(k.slice(0,5))||k.startsWith(key.slice(0,5))){data.postcode=v+'-0000';console.log('Postal found (offline partial):',data.postcode);break;}}
    }
  }catch(e){console.log('Postal code lookup failed:',e);}
}

function onCert(key,inp){
  const files=Array.from(inp.files);if(!files.length)return;
  let loaded=0;
  files.forEach(file=>{const r=new FileReader();r.onload=async e=>{
    const compressed=await compressFile(e.target.result);
    certFiles[key].push({name:file.name,data:compressed});loaded++;
    if(loaded===files.length) showStep();
  };r.readAsDataURL(file);});
}
async function ocrCertificate(imgDataUrl,certKey){
  try{
    const el=showOcrStatus('🔍 '+(t('ocrReadingCert')||'Đang đọc chứng chỉ...'));
    const text=await ocrImage(imgDataUrl);
    console.log(`OCR cert [${certKey}]:`,text);
    // Try to extract certificate name and date
    let certName='',certDate='';
    // Common certificate patterns (ordered by specificity)
    const certPatterns=[
      [/介護技能評価試験/,'介護技能評価試験'],
      [/介護日本語評価試験/,'介護日本語評価試験'],
      [/国際交流基金日本語基礎テスト|JFT[\s-]*Basic/i,'国際交流基金日本語基礎テスト'],
      [/日本語能力試験|JLPT/i,'JLPT'],
      [/特定技能.*?評価|技能評価試験/,'特定技能評価試験'],
      [/介護福祉士/,'介護福祉士'],
      [/介護職員初任者研修/,'介護職員初任者研修'],
      [/実務者研修/,'実務者研修'],
      [/建設機械施工/,'建設機械施工技士'],
      [/溶接|welding/i,'溶接技能'],
      [/電気工事士/,'電気工事士'],
      [/食品衛生/,'食品衛生責任者'],
      [/フォークリフト|forklift/i,'フォークリフト運転技能'],
      [/玉掛/,'玉掛け技能'],
      [/運転免許|driver.*?license/i,'運転免許'],
      [/NAT[\s-]*TEST/i,'NAT-TEST'],
      [/J[\s-]*TEST/i,'J-TEST'],
    ];
    for(const[pat,name] of certPatterns){
      if(pat.test(text)){
        certName=name;
        // For JLPT, extract level
        if(name==='JLPT'){const lvl=text.match(/N([1-5])/);certName='日本語能力試験'+(lvl?' N'+lvl[1]:'');}
        // For NAT-TEST, extract level
        if(name==='NAT-TEST'){const lvl=text.match(/(\d)級/);certName='NAT-TEST'+(lvl?' '+lvl[1]+'級':'');}
        break;
      }
    }
    // Extract date: Western calendar
    let dateMatch=text.match(/(\d{4})\s*[年\/\.\-]\s*(\d{1,2})\s*[月\/\.\-]?\s*(\d{0,2})/);
    if(dateMatch){const yr=parseInt(dateMatch[1]);if(yr>2015&&yr<2040)certDate=`${dateMatch[1]}/${dateMatch[2].padStart(2,'0')}`;}
    // Extract date: Japanese era (令和)
    if(!certDate){
      const eraMatch=text.match(/令和\s*(\d{1,2})\s*年\s*(\d{1,2})\s*月/);
      if(eraMatch){const yr=2018+parseInt(eraMatch[1]);certDate=`${yr}/${eraMatch[2].padStart(2,'0')}`;}
      const eraMatch2=text.match(/平成\s*(\d{1,2})\s*年\s*(\d{1,2})\s*月/);
      if(!certDate&&eraMatch2){const yr=1988+parseInt(eraMatch2[1]);certDate=`${yr}/${eraMatch2[2].padStart(2,'0')}`;}
    }
    // Check pass/fail
    let result='';
    if(/合格|passed|pass|PASS/i.test(text))result='合格';
    else if(/判定.*?A|A.*?判定|A2以上/.test(text))result='判定　合格';
    else if(/取得|修了|完了/.test(text))result='取得';
    // Auto-add to licRows if we found something
    if(certName){
      const fullDetail=certName+(result?'　　　　　　　　　　　　　'+result:'');
      // Check if already exists
      const exists=licRows.some(r=>r.detail&&r.detail.includes(certName));
      if(!exists){
        // Add or fill empty row
        const emptyRow=licRows.find(r=>!r.detail);
        if(emptyRow){emptyRow.date=certDate;emptyRow.detail=fullDetail;}
        else licRows.push({date:certDate,detail:fullDetail});
      }
      console.log('Cert auto-added:',certDate,fullDetail);
    }
    el.textContent='✅ '+(certName?certName+(result?' '+result:''):'Đọc xong');el.style.background='#2e7d32';
    setTimeout(()=>{el.remove();showStep();},2500);
  }catch(e){console.log('Cert OCR failed:',e);const el=document.getElementById('ocrStatus');if(el)el.remove();}
}

// Lang code map for API
const LANG_MAP={vi:'vi',id:'id',km:'km',ne:'ne',mn:'mn',zh:'zh-CN',my:'my',th:'th',bn:'bn',ja:'ja',en:'en',si:'si'};

// Translate text to Japanese: dictionary first, then free API fallback
async function toJP(text){
  if(!text||!text.trim())return text;
  const trimmed=text.trim();
  // Already Japanese (contains kanji/katakana/hiragana)?
  if(/[\u3000-\u9FFF\uF900-\uFAFF]/.test(trimmed))return trimmed;
  // Check dictionary (exact match, case insensitive)
  const lower=trimmed.toLowerCase();
  if(JP_DICT[lower])return JP_DICT[lower];
  // Check if text contains dictionary words — replace them
  let result=trimmed;
  const sorted=Object.keys(JP_DICT).sort((a,b)=>b.length-a.length); // longest first
  for(const key of sorted){
    const re=new RegExp(key.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    result=result.replace(re,JP_DICT[key]);
  }
  if(result!==trimmed)return result;
  // Try Google Translate via Apps Script (high quality)
  if(APPS_SCRIPT_URL){
    try{
      const lc=LANG_MAP[lang]||'vi';
      const resp=await fetch(APPS_SCRIPT_URL,{
        method:'POST',
        headers:{'Content-Type':'text/plain'},
        redirect:'follow',
        body:JSON.stringify({action:'translate',text:trimmed,sourceLang:lc,targetLang:'ja'})
      });
      const json=await resp.json();
      if(json.success&&json.translatedText){
        const tr=json.translatedText;
        if(tr&&tr!==trimmed)return tr;
      }
    }catch(e){console.log('Apps Script translation failed, trying MyMemory...');}
  }
  // Fallback: free MyMemory Translation API
  try{
    const lc=LANG_MAP[lang]||'vi';
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(trimmed)}&langpair=${lc}|ja`;
    const resp=await fetch(url,{signal:AbortSignal.timeout(4000)});
    const json=await resp.json();
    if(json.responseStatus===200&&json.responseData&&json.responseData.translatedText){
      const tr=json.responseData.translatedText;
      if(tr&&tr!==trimmed&&!tr.includes('PLEASE SELECT'))return tr;
    }
  }catch(e){console.log('MyMemory also failed, using original text');}
  return trimmed;
}

// Batch translate all form data for Word generation
async function translateAllForWord(){
  const td={...data};
  // Translate key text fields
  const textFields=['nationality','visa','address'];
  for(const k of textFields){if(td[k])td[k]=await toJP(td[k]);}
  // Translate gender/spouse/dependents
  if(td.gender){const g=td.gender.toLowerCase();td.gender=JP_DICT[g]||td.gender;}
  if(td.spouse){const s=td.spouse.toLowerCase();td.spouse=JP_DICT[s]||td.spouse;}
  if(td.dependents){const d=td.dependents.toLowerCase();td.dependents=JP_DICT[d]||td.dependents;}
  // Translate education rows
  const tEdu=[];
  for(const r of eduRows){tEdu.push({start:r.start,end:await toJP(r.end),detail:await toJP(r.detail)});}
  // Translate work rows
  const tWork=[];
  for(const r of workRows){tWork.push({start:r.start,end:await toJP(r.end),country:r.country,visa:r.visa,detail:await toJP(r.detail)});}
  // Translate license rows
  const tLic=[];
  for(const r of licRows){tLic.push({date:r.date,detail:await toJP(r.detail)});}
  // Translate remarks
  if(td.remarks)td.remarks=await toJP(td.remarks);
  return{data:td,eduRows:tEdu,workRows:tWork,licRows:tLic};
}

async function generateWord(){
  // Wait for libraries to load
  if(window._libsReady) await window._libsReady;
  if(typeof docx==='undefined') throw new Error('Word library not loaded. Please refresh the page and try again.');
  const{Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,WidthType,AlignmentType,BorderStyle,ImageRun,VerticalAlign,HeightRule}=docx;
  const bdr={style:BorderStyle.SINGLE,size:1,color:"000000"},noBdr={style:BorderStyle.NONE,size:0,color:"FFFFFF"};
  const borders={top:bdr,bottom:bdr,left:bdr,right:bdr},noBorders={top:noBdr,bottom:noBdr,left:noBdr,right:noBdr};
  // Match template: MS 明朝 font, total width 10490 DXA, A4 page
  const F="ＭＳ 明朝",F2="Times New Roman",TW=10490;
  // Column widths matching template: 6 grid columns (from XML tblGrid)
  const W0=1843,W1=1701,W2=1973,W3=2421,W4=130,W5=2422;
  // W0+W1+W2+W3+W4+W5 = 10490

  function mkCell(text,w,o={}){
    const lines=(text||'').split('\n');
    const pars=lines.map(line=>new Paragraph({
      alignment:o.center?AlignmentType.CENTER:o.right?AlignmentType.RIGHT:AlignmentType.LEFT,
      spacing:{before:25,after:25},
      children:[new TextRun({text:line,bold:!!o.bold,size:o.size||22,font:o.font||F,color:o.color||"000000"})]
    }));
    return new TableCell({
      width:{size:w,type:WidthType.DXA},
      borders:o.nb?noBorders:borders,
      verticalAlign:o.vtop?VerticalAlign.TOP:VerticalAlign.CENTER,
      margins:{top:25,bottom:25,left:80,right:80},
      children:pars.length?pars:[new Paragraph({children:[]})],
      columnSpan:o.cs,rowSpan:o.rs
    });
  }

  const today=new Date(),yy=today.getFullYear(),mm=String(today.getMonth()+1).padStart(2,'0'),dd=String(today.getDate()).padStart(2,'0');
  let photoBlob=null;
  if(photoData){try{const r=await fetch(photoData);photoBlob=await r.arrayBuffer();}catch(e){}}

  // Auto-translate all text to Japanese
  const tr=await translateAllForWord();
  const D=tr.data, tEduRows=tr.eduRows, tWorkRows=tr.workRows, tLicRows=tr.licRows;

  // ============================================================

  // ============================================================

    mkCell("履　歴　書",W0+W1,{cs:2,bold:true,size:40,font:F}),
    mkCell(`${yy}年　${mm}月　${dd}日現在`,W2+W3+W4+W5,{cs:4,right:true,size:22})
  ]}));

  // Row 1: ふりがな + name reading + PHOTO (rowSpan 2)

    ]}):mkCell("写真\n(3×4cm)",photoW,{cs:2,rs:2,center:true,size:16,color:"999999"})
  ]}));

  // Row 2: 氏名 + full name (photo continues via rowSpan)

    mkCell("氏　名",W0,{bold:true,size:22}),

  t0rows.push(new TableRow({height:{value:324,rule:HeightRule.AT_LEAST},children:[

function d2b(dataUrl){const p=dataUrl.split(',');const m=p[0].match(/:(.*?);/)[1];const b=atob(p[1]);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new Blob([a],{type:m});}
function gExt(name){const e=name.split('.').pop().toLowerCase();return['jpg','jpeg','png','gif','webp','pdf','doc','docx'].includes(e)?e:'bin';}

async function createZip(){
  const zip=new JSZip(),nm=(data.fullname||'profile').replace(/\s+/g,'_'),ds=new Date().toISOString().slice(0,10);
  const wordBlob=await generateWord();
  zip.file(`履歴書_${nm}_${ds}.docx`,wordBlob);
  const folder=zip.folder(`写真_${nm}`);
  if(photoData)folder.file(`証明写真_3x4.jpg`,d2b(photoData));
  zairyuFront.forEach((f,i)=>folder.file(`在留カード_表_${i+1}.${gExt(f.name)}`,d2b(f.data)));
  zairyuBack.forEach((f,i)=>folder.file(`在留カード_裏_${i+1}.${gExt(f.name)}`,d2b(f.data)));
  const certNames={certSenmon:'専門級',certLicense:'運転免許',certJlpt:'日本語_JLPT',certTokutei:'特定技能',certOther:'その他'};
  Object.entries(certFiles).forEach(([k,arr])=>{arr.forEach((f,i)=>folder.file(`${certNames[k]||k}_${i+1}.${gExt(f.name)}`,d2b(f.data)));});
  return await zip.generateAsync({type:'blob'});
}

function mobileSave(blob,fname){
  try{
    // Try saveAs first
    if(typeof saveAs==='function'){saveAs(blob,fname);return;}
  }catch(e){}
  // Fallback: create download link (works on iOS/Android)
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
}
async function doDownloadZip(){
  showLoading();
  try{const z=await createZip();const nm=(data.fullname||'profile').replace(/\s+/g,'_');mobileSave(z,`履歴書_${nm}_${new Date().toISOString().slice(0,10)}.zip`);hideLoading();showSuccess();}
  catch(e){hideLoading();alert('Error: '+e.message);console.error(e);}
}
// ★★★ QUAN TRỌNG: Dán URL Google Apps Script vào đây ★★★
// Xem file "email-server-script.gs" để biết cách tạo URL
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbzzU0w3VPyVZ09lnEgPwgSEB0kwFV-HpXxsa5rA5RAx1BUSP-uMb4ZzJJHMVpL5ioE2Nw/exec';

async function doEmailZip(){
  const sel=getSelectedEmails();if(!sel.length){alert('Please select email!');return;}

  if(!APPS_SCRIPT_URL){
    alert('⚠️ Chưa cấu hình email server!\nFile ZIP sẽ được tải về máy.');
    showLoading();
    try{
      const z=await createZip();const nm=(data.fullname||'profile').replace(/\s+/g,'_');
      mobileSave(z,`履歴書_${nm}_${new Date().toISOString().slice(0,10)}.zip`);
      hideLoading();showSuccess();
    }catch(e){hideLoading();alert('Error: '+e.message);}
    return;
  }

  showLoading(t('sendingEmail')||'Đang gửi email...','📧');
  try{
    // Create ZIP once, generate base64 only (saves memory on mobile)
    const zip=new JSZip(),nm=(data.fullname||'profile').replace(/\s+/g,'_'),ds=new Date().toISOString().slice(0,10);
    const wordBlob=await generateWord();
    zip.file(`履歴書_${nm}_${ds}.docx`,wordBlob);
    const folder=zip.folder(`写真_${nm}`);
    if(photoData)folder.file(`証明写真_3x4.jpg`,d2b(photoData));
    zairyuFront.forEach((f,i)=>folder.file(`在留カード_表_${i+1}.${gExt(f.name)}`,d2b(f.data)));
    zairyuBack.forEach((f,i)=>folder.file(`在留カード_裏_${i+1}.${gExt(f.name)}`,d2b(f.data)));
    const certNames={certSenmon:'専門級',certLicense:'運転免許',certJlpt:'日本語_JLPT',certTokutei:'特定技能',certOther:'その他'};
    Object.entries(certFiles).forEach(([k,arr])=>{arr.forEach((f,i)=>folder.file(`${certNames[k]||k}_${i+1}.${gExt(f.name)}`,d2b(f.data)));});

    const fname=`履歴書_${nm}_${ds}.zip`;

    // Generate base64 for email (single generation to save memory)
    const zipBase64=await zip.generateAsync({type:'base64',compression:'DEFLATE',compressionOptions:{level:6}});
    const sizeMB=(zipBase64.length*0.75/1024/1024).toFixed(1);
    console.log('ZIP size:',sizeMB,'MB');

    // Check if too large for email (Gmail limit ~25MB)
    if(parseFloat(sizeMB)>20){
      // Save locally instead
      const raw=atob(zipBase64);const arr=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      mobileSave(new Blob([arr],{type:'application/zip'}),fname);
      hideLoading();
      alert(`⚠️ File quá lớn (${sizeMB}MB) để gửi email.\n\n📎 File ZIP đã tải về máy.\nVui lòng gửi thủ công qua email.`);
      showSuccess();return;
    }

    // Send via Google Apps Script
    let emailSent=false;
    try{
      const resp=await fetch(APPS_SCRIPT_URL,{
        method:'POST',
        headers:{'Content-Type':'text/plain'},
        redirect:'follow',
        body:JSON.stringify({
          emails:sel,
          fullname:data.fullname||'',
          furigana:data.furigana||'',
          nationality:data.nationality||'',
          visa:data.visa||'',
          phone:data.phone||'',
          email:data.email||'',
          zipBase64:zipBase64,
          fileName:fname
        })
      });
      let result;
      try{result=await resp.json();}catch(e){result={success:resp.ok};}
      emailSent=result.success;
      if(!emailSent)console.error('Apps Script error:',result);
    }catch(fetchErr){
      console.error('Fetch error:',fetchErr);
      // Try no-cors as fallback (can't read response but request may succeed)
      try{
        await fetch(APPS_SCRIPT_URL,{
          method:'POST',
          mode:'no-cors',
          headers:{'Content-Type':'text/plain'},
          body:JSON.stringify({
            emails:sel,
            fullname:data.fullname||'',
            furigana:data.furigana||'',
            nationality:data.nationality||'',
            visa:data.visa||'',
            phone:data.phone||'',
            email:data.email||'',
            zipBase64:zipBase64,
            fileName:fname
          })
        });
        emailSent=true;// Assume success in no-cors mode
      }catch(e2){console.error('no-cors also failed:',e2);}
    }

    // Save locally as backup (convert base64 back to blob for download)
    try{
      const raw=atob(zipBase64);const arr=new Uint8Array(raw.length);
      for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);
      mobileSave(new Blob([arr],{type:'application/zip'}),fname);
    }catch(dlErr){console.error('Download error:',dlErr);}

    hideLoading();
    if(emailSent){
      alert(`✅ Email đã gửi thành công!\n\n📧 Đã gửi đến:\n${sel.join('\n')}\n\n📎 File ${fname} cũng đã tải về máy.`);
    }else{
      alert(`⚠️ Gửi email có thể thất bại.\n\n📎 File ZIP đã tải về máy.\nVui lòng kiểm tra email.`);
    }
    showSuccess();
  }catch(e){
    hideLoading();
    console.error('Email error:',e);
    try{
      const z=await createZip();const nm2=(data.fullname||'profile').replace(/\s+/g,'_');
      mobileSave(z,`履歴書_${nm2}_${new Date().toISOString().slice(0,10)}.zip`);
    }catch(e2){}
    alert(`⚠️ Không gửi được email (${e.message}).\n\n📎 File ZIP đã tải về máy.`);
    showSuccess();
  }
}
